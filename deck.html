<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sponsorship Deck — Josh Wood Racing</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --purple: #a855f7;
      --purple-dark: #7b2fbe;
      --text: #f0f0f0;
      --muted: #777;
      --border: rgba(168, 85, 247, 0.18);
      --card: #111;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      height: 64px;
      background: rgba(13,13,13,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text);
      text-decoration: none;
    }
    .nav-logo span { color: var(--purple); }
    .nav-links { display: flex; gap: 28px; list-style: none; }
    .nav-links a {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--purple); }

    /* HERO */
    .hero {
      margin-top: 64px;
      padding: 48px 40px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 20px;
      flex-wrap: wrap;
    }
    .hero-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--purple);
      margin-bottom: 10px;
    }
    .accent-line { width: 40px; height: 2px; background: var(--purple); margin-bottom: 16px; }
    .hero h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(2.2rem, 4.5vw, 3.6rem);
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      line-height: 1;
    }
    .hero h1 span { color: var(--purple); }
    .hero-meta {
      font-size: 0.85rem;
      color: var(--muted);
      font-weight: 300;
      line-height: 1.7;
      text-align: right;
    }

    /* TOOLBAR */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 40px;
      background: rgba(168,85,247,0.05);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
      gap: 12px;
    }
    .slide-counter {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .slide-counter span { color: var(--purple); }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 9px 20px;
      border: none;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      text-decoration: none;
    }
    .btn-primary { background: var(--purple); color: #fff; }
    .btn-primary:hover { background: var(--purple-dark); transform: translateY(-1px); }
    .btn svg { width: 13px; height: 13px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    /* VIEWER */
    .viewer { padding: 40px 40px 20px; display: flex; flex-direction: column; align-items: center; }

    /* FIXED: use aspect-ratio instead of padding-top hack for mobile compatibility */
    .slide-stage {
      position: relative;
      width: 100%;
      max-width: 1060px;
      aspect-ratio: 16 / 9;
      background: var(--card);
      border: 1px solid var(--border);
      overflow: hidden;
      user-select: none;
      cursor: grab;
    }
    .slide-stage:active { cursor: grabbing; }

    .slides-track {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      transition: transform 0.42s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .slide { min-width: 100%; height: 100%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .slide img { width: 100%; height: 100%; object-fit: contain; display: block; pointer-events: none; }

    /* ARROWS */
    .arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 10;
      background: rgba(13,13,13,0.72);
      border: 1px solid var(--border);
      color: var(--text);
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      backdrop-filter: blur(6px);
    }
    .arrow:hover { background: rgba(168,85,247,0.25); border-color: var(--purple); }
    .arrow svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .arrow-prev { left: 12px; }
    .arrow-next { right: 12px; }
    .arrow:disabled { opacity: 0.15; pointer-events: none; }

    /* PROGRESS */
    .progress-bar { width: 100%; max-width: 1060px; height: 2px; background: rgba(255,255,255,0.06); }
    .progress-fill { height: 100%; background: var(--purple); transition: width 0.42s cubic-bezier(0.4,0,0.2,1); }

    /* THUMBNAILS */
    .thumbnails {
      display: flex;
      gap: 8px;
      margin-top: 16px;
      width: 100%;
      max-width: 1060px;
      overflow-x: auto;
      padding-bottom: 4px;
      scrollbar-width: thin;
      scrollbar-color: var(--purple) transparent;
    }
    .thumbnails::-webkit-scrollbar { height: 3px; }
    .thumbnails::-webkit-scrollbar-thumb { background: var(--purple); }
    .thumb {
      flex-shrink: 0;
      width: 80px; height: 45px;
      border: 2px solid transparent;
      cursor: pointer;
      overflow: hidden;
      opacity: 0.4;
      transition: opacity 0.2s, border-color 0.2s;
    }
    .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .thumb:hover { opacity: 0.7; }
    .thumb.active { border-color: var(--purple); opacity: 1; }

    .keyboard-hint {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 12px;
      opacity: 0.5;
    }
    .keyboard-hint kbd {
      background: rgba(255,255,255,0.07);
      border: 1px solid var(--border);
      padding: 1px 6px;
      font-family: inherit;
    }

    /* FOOTER */
    footer {
      margin-top: 48px;
      padding: 28px 40px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    footer p { font-size: 0.78rem; color: var(--muted); font-family: 'Barlow Condensed', sans-serif; letter-spacing: 0.08em; text-transform: uppercase; }
    footer a { color: var(--purple); text-decoration: none; font-size: 0.78rem; font-family: 'Barlow Condensed', sans-serif; letter-spacing: 0.08em; text-transform: uppercase; }
    footer a:hover { text-decoration: underline; }

    @media (max-width: 640px) {
      nav { padding: 0 20px; }
      .nav-links { gap: 14px; }
      .nav-links li:nth-child(3) { display: none; }
      .hero { padding: 36px 20px 24px; }
      .hero-meta { text-align: left; }
      .toolbar { padding: 12px 20px; }
      .viewer { padding: 16px 12px 12px; }
      .arrow { width: 36px; height: 36px; }
      .thumb { width: 58px; height: 33px; }
      footer { padding: 24px 20px; }
      .keyboard-hint { display: none; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="/" class="nav-logo">Josh <span>#36</span> Wood</a>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>

      <li><a href="/gallery.html">Gallery</a></li>
      <li><a href="mailto:Maiteland@belallure.travel">Contact</a></li>
    </ul>
  </nav>

  <section class="hero">
    <div>
      <p class="hero-label">2026 Season</p>
      <div class="accent-line"></div>
      <h1>Sponsorship<br><span>Deck</span></h1>
    </div>
    <p class="hero-meta">
      Josh Wood · JuniorGP 2026<br>
      MIR Racing · #36 · #3<br>
      Season opens Barcelona · 24 May 2026
    </p>
  </section>

  <div class="toolbar">
    <p class="slide-counter">Slide <span id="currentSlide">1</span> of 15</p>
    <a class="btn btn-primary" href="Joshua_Wood_2026.pdf" download>
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Download PDF
    </a>
  </div>

  <div class="viewer">
    <div class="slide-stage" id="stage">
      <div class="slides-track" id="track">
        <div class="slide"><img src="slides/1.jpeg"  alt="Slide 1"  loading="eager" /></div>
        <div class="slide"><img src="slides/2.jpeg"  alt="Slide 2"  loading="lazy" /></div>
        <div class="slide"><img src="slides/3.jpeg"  alt="Slide 3"  loading="lazy" /></div>
        <div class="slide"><img src="slides/4.jpeg"  alt="Slide 4"  loading="lazy" /></div>
        <div class="slide"><img src="slides/5.jpeg"  alt="Slide 5"  loading="lazy" /></div>
        <div class="slide"><img src="slides/6.jpeg"  alt="Slide 6"  loading="lazy" /></div>
        <div class="slide"><img src="slides/7.jpeg"  alt="Slide 7"  loading="lazy" /></div>
        <div class="slide"><img src="slides/8.jpeg"  alt="Slide 8"  loading="lazy" /></div>
        <div class="slide"><img src="slides/9.jpeg"  alt="Slide 9"  loading="lazy" /></div>
        <div class="slide"><img src="slides/10.jpeg" alt="Slide 10" loading="lazy" /></div>
        <div class="slide"><img src="slides/11.jpeg" alt="Slide 11" loading="lazy" /></div>
        <div class="slide"><img src="slides/12.jpeg" alt="Slide 12" loading="lazy" /></div>
        <div class="slide"><img src="slides/13.jpeg" alt="Slide 13" loading="lazy" /></div>
        <div class="slide"><img src="slides/14.jpeg" alt="Slide 14" loading="lazy" /></div>
        <div class="slide"><img src="slides/15.jpeg" alt="Slide 15" loading="lazy" /></div>
      </div>
      <button class="arrow arrow-prev" id="prev" aria-label="Previous slide" disabled>
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>

        <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
      </button>

    <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>

    <div class="thumbnails" id="thumbs"></div>

  <footer>
    <p>© 2026 Joshua Wood Racing Academy</p>
    <a href="mailto:Maiteland@belallure.travel">Maiteland@belallure.travel</a>
  </footer>

  <script>
    const TOTAL = 15;
    let current = 0;
    let startX = 0;

    const track    = document.getElementById('track');
    const prev     = document.getElementById('prev');
    const next     = document.getElementById('next');
    const countEl  = document.getElementById('currentSlide');
    const progEl   = document.getElementById('progress');
    const thumbsEl = document.getElementById('thumbs');
    const stage    = document.getElementById('stage');

    for (let i = 0; i < TOTAL; i++) {
      const t = document.createElement('div');
      t.className = 'thumb' + (i === 0 ? ' active' : '');
      t.innerHTML = `<img src="slides/${i+1}.jpeg" alt="Slide ${i+1}" loading="lazy">`;
      t.addEventListener('click', () => goTo(i));
      thumbsEl.appendChild(t);
    }

    function goTo(n) {
      current = Math.max(0, Math.min(TOTAL - 1, n));
      track.style.transform = `translateX(-${current * 100}%)`;
      countEl.textContent = current + 1;
      progEl.style.width = `${((current + 1) / TOTAL) * 100}%`;
      prev.disabled = current === 0;
      next.disabled = current === TOTAL - 1;
      document.querySelectorAll('.thumb').forEach((t, i) => t.classList.toggle('active', i === current));
      thumbsEl.children[current]?.scrollIntoView({ inline: "nearest", behavior: "smooth" });
      const stageTop = stage.getBoundingClientRect().top + window.scrollY - 72;
      window.scrollTo({ top: stageTop, behavior: "smooth" });
    }

    prev.addEventListener('click', () => goTo(current - 1));
    next.addEventListener('click', () => goTo(current + 1));

    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft')  goTo(current - 1);
      if (e.key === 'ArrowRight') goTo(current + 1);
      if (e.key === 'f' || e.key === 'F') {
        document.fullscreenElement ? document.exitFullscreen() : stage.requestFullscreen();
      }
    });

    stage.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, { passive: true });
    stage.addEventListener('touchend',   e => {
      const diff = startX - e.changedTouches[0].clientX;
      if (Math.abs(diff) > 40) goTo(diff > 0 ? current + 1 : current - 1);
    }, { passive: true });

    stage.addEventListener('mousedown', e => { startX = e.clientX; });
    stage.addEventListener('mouseup',   e => {
      const diff = startX - e.clientX;
      if (Math.abs(diff) > 40) goTo(diff > 0 ? current + 1 : current - 1);
    });

    goTo(0);
  </script>
