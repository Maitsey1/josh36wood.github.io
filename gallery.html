<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gallery — Joshua Wood Racing</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d0d;
      --purple: #7b2fbe;
      --purple-light: #a855f7;
      --border: rgba(255,255,255,0.07);
    }
    body { background: var(--bg); color: #fff; font-family: 'Barlow Condensed', sans-serif; overflow-x: hidden; }

    /* NAV */
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 200; display: flex; align-items: center; justify-content: space-between; padding: 18px 48px; background: rgba(13,13,13,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); }
    .nav-logo { font-weight: 900; font-size: 1.4rem; letter-spacing: 0.08em; text-transform: uppercase; color: #fff; text-decoration: none; }
    .nav-logo span { color: var(--purple-light); }
    .nav-links { display: flex; gap: 36px; list-style: none; }
    .nav-links a { font-weight: 600; font-size: 0.85rem; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.55); text-decoration: none; transition: color 0.2s; }
    .nav-links a:hover, .nav-links a.active { color: var(--purple-light); }

    /* PAGE */
    .gw { padding: 110px 48px 80px; }
    .gh { margin-bottom: 28px; }
    .gt { color: var(--purple-light); font-size: 11px; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 8px; }
    .gtitle { color: #fff; font-size: 52px; font-weight: 900; line-height: 0.9; text-transform: uppercase; letter-spacing: -1px; }
    .gtitle span { color: var(--purple-light); }
    .gdiv { width: 48px; height: 3px; background: var(--purple); margin: 14px 0 22px; }

    /* FILTERS */
    .gfilters { display: flex; gap: 8px; margin-bottom: 28px; flex-wrap: wrap; }
    .gf { background: transparent; border: 1px solid #2a2a2a; color: #888; padding: 7px 18px; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; font-family: 'Barlow Condensed', sans-serif; transition: all 0.18s; }
    .gf:hover { border-color: var(--purple-light); color: #fff; }
    .gf.on { background: var(--purple); border-color: var(--purple); color: #fff; }

    /* PHOTO GRID */
    .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
    .photo-grid .item { position: relative; overflow: hidden; background: #111; cursor: pointer; height: 380px; }
    .photo-grid .item img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.4s; filter: brightness(0.88); }
    .photo-grid .item:hover img { transform: scale(1.04); filter: brightness(1); }
    .cap { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(to top, rgba(0,0,0,0.85), transparent); padding: 28px 12px 10px; opacity: 0; transition: opacity 0.2s; }
    .photo-grid .item:hover .cap { opacity: 1; }
    .ct { color: #fff; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; }
    .cs { color: var(--purple-light); font-size: 9px; letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }

    /* SHOW MORE */
    .show-more-wrap { display: none; justify-content: center; align-items: center; flex-direction: column; gap: 10px; margin-top: 28px; }
    .show-more-wrap.visible { display: flex; }
    #showMoreBtn { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: #fff; background: transparent; border: 1px solid var(--purple); padding: 12px 36px; cursor: pointer; transition: all 0.2s; }
    #showMoreBtn:hover { background: var(--purple); }
    #photoCount { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #555; }

    /* REELS */
    .vsec { margin-top: 56px; padding-top: 28px; border-top: 1px solid #1a1a1a; }
    .vt { color: var(--purple-light); font-size: 11px; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 20px; }
    .vrow { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
    .vcard { background: #111; border: 1px solid #1a1a1a; border-radius: 3px; overflow: hidden; }
    .vcard-hdr { padding: 12px 16px; border-bottom: 1px solid #1a1a1a; }
    .vcard-tag { color: var(--purple-light); font-size: 10px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 3px; }
    .vcard-hdr h3 { color: #fff; font-size: 15px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; }
    .vembed { display: flex; justify-content: center; background: #000; padding: 8px; }
    .vembed blockquote.instagram-media { background: #fff !important; border: 0 !important; border-radius: 3px !important; box-shadow: none !important; margin: 0 auto !important; max-width: 100% !important; min-width: 0 !important; width: 100% !important; padding: 0 !important; }

    /* LIGHTBOX */
    .lb { display: none; position: fixed; inset: 0; z-index: 999; background: rgba(0,0,0,0.94); align-items: center; justify-content: center; }
    .lb.open { display: flex; }
    .lb-inner { position: relative; display: flex; flex-direction: column; align-items: center; }
    .lb-inner img { max-width: 88vw; max-height: 85vh; object-fit: contain; display: block; }
    .lb-close { position: absolute; top: -42px; right: 0; background: none; border: none; color: rgba(255,255,255,0.6); font-size: 1.6rem; cursor: pointer; transition: color 0.2s; }
    .lb-close:hover { color: #fff; }
    .lb-nav { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(123,47,190,0.55); border: none; color: #fff; font-size: 1.4rem; width: 42px; height: 42px; cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: 2px; transition: background 0.2s; }
    .lb-nav:hover { background: var(--purple); }
    .lb-prev { right: calc(100% + 12px); }
    .lb-next { left: calc(100% + 12px); }
    .lb-cap { margin-top: 12px; font-size: 10px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--purple-light); }

    /* FOOTER */
    footer { border-top: 1px solid var(--border); padding: 32px 48px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
    .f-logo { font-weight: 900; font-size: 1.1rem; letter-spacing: 0.08em; text-transform: uppercase; color: #fff; }
    .f-logo span { color: var(--purple-light); }
    footer p { font-size: 0.78rem; color: #888; }
    footer a { font-size: 0.78rem; color: var(--purple-light); text-decoration: none; }

    @media (max-width: 768px) {
      nav { padding: 14px 20px; }
      .nav-links { gap: 16px; }
      .gw { padding: 90px 20px 60px; }
      .gtitle { font-size: 36px; }
      .photo-grid { grid-template-columns: 1fr 1fr; }
      .photo-grid .item { height: 220px; }
      .vrow { grid-template-columns: 1fr; }
      footer { padding: 24px 20px; }
    }
    @media (max-width: 480px) {
      .photo-grid { grid-template-columns: 1fr; }
      .photo-grid .item { height: 260px; }
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Josh <span>#36</span> Wood</a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="gallery.html" class="active">Gallery</a></li>
    <li><a href="partner.html">Partner</a></li>

  </ul>

  <div class="gh">

  <div class="gfilters">
    <button class="gf on" data-filter="all">All</button>
    <button class="gf" data-filter="training">Training</button>
    <button class="gf" data-filter="redbull">Red Bull Rookies</button>
    <button class="gf" data-filter="race">Race Day</button>

  <div class="show-more-wrap" id="showMoreWrap">

  <div class="vsec">

    <div class="vrow">

      <div class="vcard">
        <div class="vcard-hdr">

        <div class="vembed">

<div class="lb" id="lb">
  <div class="lb-inner">
    <button class="lb-close" id="lbClose">&#x2715; Close</button>
    <button class="lb-nav lb-prev" id="lbPrev">&#8592;</button>
    <img src="" alt="" id="lbImg"/>
    <button class="lb-nav lb-next" id="lbNext">&#8594;</button>
    <p class="lb-cap" id="lbCap"></p>
  </div>
</div>

<script>
  const PHOTOS = [
    { src:'redbull3.jpeg',    cat:'redbull', title:'Riders Walk',           sub:'Red Bull Rookies' },
    { src:'race1.jpeg',       cat:'race',    title:'On The Limit',          sub:'Race Day' },
    { src:'training2.jpeg',   cat:'training',title:'Sunset Session',        sub:'Training' },
    { src:'redbull5.jpeg',    cat:'redbull', title:'Pit Lane Briefing',     sub:'Red Bull Rookies' },
    { src:'race5.jpeg',       cat:'race',    title:'Race Start',            sub:'Race Day' },
    { src:'trackwalk4.jpeg',  cat:'redbull', title:'Track Walk',            sub:'Red Bull Rookies' },
    { src:'behindscene2.jpeg',cat:'behind',  title:'Marc Marquez Monument', sub:'Behind The Scenes' },
    { src:'training4.jpeg',   cat:'training',title:'Corner Speed',          sub:'Training' },
    { src:'redbull6.jpeg',    cat:'redbull', title:'120 Selectees',         sub:'Red Bull Rookies' },
    { src:'behindscene3.jpeg',cat:'behind',  title:'Garage',                sub:'Behind The Scenes' },
    { src:'race4.jpeg',       cat:'race',    title:'Pack Racing',           sub:'Race Day' },
    { src:'trackwalk2.jpeg',  cat:'behind',  title:'Track Walk',            sub:'Portimao' },
    { src:'media1.png',       cat:'media',   title:'FTV Interview',         sub:'Media' },
    { src:'media.jpeg',       cat:'media',   title:'Talk Radio Europe',     sub:'Media' },
    { src:'media2.png',       cat:'media',   title:'FTV Panel',             sub:'Media' },
    { src:'Interview_Marbella_.jpeg',cat:'media',   title:'Marbella Noticias',     sub:'Media' },
    { src:'redbull2.jpeg',    cat:'redbull', title:'Selection Day',         sub:'Red Bull Rookies' },
    { src:'redbull4.jpeg',    cat:'redbull', title:'On Track',              sub:'Red Bull Rookies' },
    { src:'training1.jpeg',   cat:'training',title:'SPN Academy',           sub:'Training' },
    { src:'training3.jpeg',   cat:'training',title:'On The Brakes',         sub:'Training' },
    { src:'training5.jpeg',   cat:'training',title:'Track Time',            sub:'Training' },
    { src:'race2.jpeg',       cat:'race',    title:'Full Lean',             sub:'Race Day' },
    { src:'behindscene1.jpeg',cat:'behind',  title:'Pit Lane',              sub:'Behind The Scenes' },
    { src:'race3.jpeg',       cat:'race',    title:'Mid Corner',            sub:'Race Day' },
    { src:'behindscene4.jpeg',cat:'behind',  title:'Team Debrief',          sub:'Behind The Scenes' },
    // ADD NEW PHOTOS BELOW THIS LINE
    { src:'behindscene5.jpeg',cat:'behind',  title:'Race Day Prep',         sub:'Behind The Scenes' },
    { src:'behindscene6.jpeg',cat:'behind',  title:'With The Team',         sub:'Behind The Scenes' },
    { src:'trackwalk1.jpeg',  cat:'behind',  title:'Track Walk',            sub:'Circuit de Catalunya' },
    { src:'trackwalk3.jpeg',  cat:'behind',  title:'Track Walk',            sub:'Jerez' },
  ];

  const INITIAL_COUNT = 24;
  const PAGE_SIZE = 9;

  const photoGrid    = document.getElementById('photoGrid');
  const showMoreWrap = document.getElementById('showMoreWrap');
  const showMoreBtn  = document.getElementById('showMoreBtn');
  const photoCount   = document.getElementById('photoCount');
  const lb           = document.getElementById('lb');
  const lbImg        = document.getElementById('lbImg');
  const lbCap        = document.getElementById('lbCap');

  let activePhotos  = [];
  let loadedUpTo    = 0;
  let cur           = 0;
  let currentFilter = 'all';

  function getPool(filter) {
    return filter === 'all' ? PHOTOS : PHOTOS.filter(function(p){ return p.cat === filter; });
  }

  function makeTile(photo, lbIndex) {
    var div = document.createElement('div');
    div.className = 'item';
    div.innerHTML =
      '<img src="' + photo.src + '" alt="' + photo.title + '" loading="lazy"/>' +
      '<div class="cap"><div class="ct">' + photo.title + '</div><div class="cs">' + photo.sub + '</div></div>';
    div.addEventListener('click', function() {
      activePhotos = getPool(currentFilter).slice(0, loadedUpTo);
      openLb(lbIndex);
    });
    return div;
  }

  function updateBtn() {
    var pool = getPool(currentFilter);
    var remaining = pool.length - loadedUpTo;
    if (remaining <= 0) {
      showMoreWrap.classList.remove('visible');
    } else {
      showMoreWrap.classList.add('visible');
      photoCount.textContent = Math.min(remaining, PAGE_SIZE) + ' of ' + remaining + ' remaining';
    }
  }

  function render(filter) {
    currentFilter = filter;
    photoGrid.innerHTML = '';
    loadedUpTo = 0;
    var pool = getPool(filter);
    var batch = pool.slice(0, INITIAL_COUNT);
    loadedUpTo = batch.length;
    for (var i = 0; i < batch.length; i++) {
      photoGrid.appendChild(makeTile(batch[i], i));
    }
    activePhotos = pool.slice(0, loadedUpTo);
    updateBtn();
  }

  render('all');

  showMoreBtn.addEventListener('click', function() {
    var pool = getPool(currentFilter);
    var start = loadedUpTo;
    var batch = pool.slice(start, start + PAGE_SIZE);
    for (var i = 0; i < batch.length; i++) {
      photoGrid.appendChild(makeTile(batch[i], start + i));
    }
    loadedUpTo = Math.min(start + PAGE_SIZE, pool.length);
    activePhotos = pool.slice(0, loadedUpTo);
    updateBtn();
  });

  document.querySelectorAll('.gf').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.gf').forEach(function(b){ b.classList.remove('on'); });
      btn.classList.add('on');
      render(btn.dataset.filter);
    });
  });

  function openLb(index) {
    cur = index;
    lbImg.src = activePhotos[cur].src;
    lbCap.textContent = activePhotos[cur].title + ' — ' + activePhotos[cur].sub;
    lb.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLb() {
    lb.classList.remove('open');
    document.body.style.overflow = '';
  }

  document.getElementById('lbClose').addEventListener('click', closeLb);
  lb.addEventListener('click', function(e){ if (e.target === lb) closeLb(); });

  document.getElementById('lbPrev').addEventListener('click', function() {
    cur = (cur - 1 + activePhotos.length) % activePhotos.length;
    lbImg.src = activePhotos[cur].src;
    lbCap.textContent = activePhotos[cur].title + ' — ' + activePhotos[cur].sub;
  });

  document.getElementById('lbNext').addEventListener('click', function() {
    cur = (cur + 1) % activePhotos.length;
    lbImg.src = activePhotos[cur].src;
    lbCap.textContent = activePhotos[cur].title + ' — ' + activePhotos[cur].sub;
  });

  document.addEventListener('keydown', function(e) {
    if (!lb.classList.contains('open')) return;
    if (e.key === 'Escape') closeLb();
    if (e.key === 'ArrowLeft') document.getElementById('lbPrev').click();
    if (e.key === 'ArrowRight') document.getElementById('lbNext').click();
  });
</script>

<script async src="https://www.instagram.com/embed.js"></script>
</body>
</html>
