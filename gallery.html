<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gallery — Joshua Wood Racing</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --purple: #7b2fbe;
      --purple-light: #a855f7;
      --border: rgba(255,255,255,0.07);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: #fff;
      font-family: 'Barlow Condensed', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 48px;
      background: rgba(13,13,13,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      font-weight: 900;
      font-size: 1.4rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #fff;
      text-decoration: none;
    }
    .nav-logo span { color: var(--purple-light); }
    .nav-links { display: flex; gap: 36px; list-style: none; }
    .nav-links a {
      font-weight: 600;
      font-size: 0.85rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-links a:hover, .nav-links a.active { color: var(--purple-light); }

    /* PAGE */
    .gw { padding: 120px 48px 80px; }

    .gh { margin-bottom: 32px; }
    .gt {
      color: var(--purple-light);
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .gtitle {
      color: #fff;
      font-size: 56px;
      font-weight: 900;
      line-height: 0.9;
      text-transform: uppercase;
      letter-spacing: -1px;
    }
    .gtitle span { color: var(--purple-light); }
    .gdiv { width: 48px; height: 3px; background: var(--purple); margin: 16px 0 24px; }

    /* FILTERS */
    .gfilters { display: flex; gap: 8px; margin-bottom: 32px; flex-wrap: wrap; }
    .gf {
      background: transparent;
      border: 1px solid #2a2a2a;
      color: #888;
      padding: 7px 18px;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      font-family: 'Barlow Condensed', sans-serif;
      transition: all 0.18s;
    }
    .gf:hover { border-color: var(--purple-light); color: #fff; }
    .gf.on { background: var(--purple); border-color: var(--purple); color: #fff; }

    /* PHOTO GRID */
    .photo-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }

    /* PHOTO TILE — natural height, no cropping */
    .item {
      position: relative;
      overflow: hidden;
      background: #111;
      cursor: pointer;
    }
    .item img {
      width: 100%;
      height: auto;
      display: block;
      transition: transform 0.4s;
      filter: brightness(0.88);
    }
    .item:hover img { transform: scale(1.04); filter: brightness(1); }
    .cap {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
      padding: 28px 14px 12px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .item:hover .cap { opacity: 1; }
    .ct { color: #fff; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; }
    .cs { color: var(--purple-light); font-size: 9px; letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }

    /* SHOW MORE */
    .show-more-wrap {
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 12px;
      margin-top: 32px;
    }
    .show-more-wrap.visible { display: flex; }
    #showMoreBtn {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #fff;
      background: transparent;
      border: 1px solid var(--purple);
      padding: 14px 40px;
      cursor: pointer;
      transition: all 0.2s;
    }
    #showMoreBtn:hover { background: var(--purple); }
    #photoCount {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #555;
    }

    /* VIDEO */
    .vsec { margin-top: 48px; padding-top: 32px; border-top: 1px solid #1a1a1a; }
    .vt { color: var(--purple-light); font-size: 11px; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 20px; }
    .vgrid-top { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    .vgrid-bottom { display: flex; justify-content: center; }
    .vgrid-bottom .vcard { width: calc(50% - 8px); }
    .vcard { background: #111; border: 1px solid #1a1a1a; border-radius: 3px; overflow: hidden; }
    .vcard-hdr { padding: 12px 16px 10px; border-bottom: 1px solid #1a1a1a; }
    .vcard-tag { color: var(--purple-light); font-size: 10px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 3px; }
    .vcard-hdr h3 { color: #fff; font-size: 16px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; }
    .vembed { background: #000; display: flex; justify-content: center; min-height: 300px; max-height: 400px; overflow: hidden; }
    .vembed blockquote { width: 100% !important; max-width: 100% !important; margin: 0 !important; border: none !important; box-shadow: none !important; background: #000 !important; }

    /* LIGHTBOX */
    .lb { display: none; position: fixed; inset: 0; z-index: 999; background: rgba(0,0,0,0.94); align-items: center; justify-content: center; backdrop-filter: blur(8px); }
    .lb.open { display: flex; }
    .lb-inner { position: relative; display: flex; flex-direction: column; align-items: center; }
    .lb-inner img { max-width: 88vw; max-height: 88vh; object-fit: contain; display: block; }
    .lb-close { position: absolute; top: -44px; right: 0; background: none; border: none; color: rgba(255,255,255,0.6); font-size: 1.8rem; cursor: pointer; font-family: 'Barlow Condensed', sans-serif; transition: color 0.2s; }
    .lb-close:hover { color: #fff; }
    .lb-nav { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(123,47,190,0.55); border: none; color: #fff; font-size: 1.4rem; width: 42px; height: 42px; cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: 2px; transition: background 0.2s; }
    .lb-nav:hover { background: var(--purple); }
    .lb-prev { right: calc(100% + 14px); }
    .lb-next { left: calc(100% + 14px); }
    .lb-cap { margin-top: 14px; font-size: 10px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--purple-light); }

    /* FOOTER */
    footer { border-top: 1px solid var(--border); padding: 36px 48px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
    .f-logo { font-weight: 900; font-size: 1.1rem; letter-spacing: 0.08em; text-transform: uppercase; color: #fff; }
    .f-logo span { color: var(--purple-light); }
    footer p { font-size: 0.78rem; color: #888; letter-spacing: 0.06em; }
    footer a { font-size: 0.78rem; color: var(--purple-light); text-decoration: none; }

    @media (max-width: 768px) {
      nav { padding: 16px 24px; }
      .nav-links { gap: 18px; }
      .gw { padding: 100px 20px 60px; }
      .gtitle { font-size: 38px; }
      .photo-grid { grid-template-columns: 1fr 1fr; gap: 4px; }
      .vgrid-top { grid-template-columns: 1fr; }
      .vgrid-bottom .vcard { width: 100%; }
      footer { padding: 24px; }
    }
    @media (max-width: 480px) {
      .photo-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

<script>
  // ── PHOTO DATA ───────────────────────────────────────────────────────────────
  // To add new photos: append an entry to PHOTOS below.
  // cat options: 'redbull' | 'training' | 'race' | 'behind' | 'media'
  // First 24 show on load. Everything after appears in Show More batches of 9.

  const PHOTOS = [
    { src:'redbull3.jpeg',    cat:'redbull', title:'Riders Walk',           sub:'Red Bull Rookies' },
    { src:'race1.jpeg',       cat:'race',    title:'On The Limit',          sub:'Race Day' },
    { src:'training2.jpeg',   cat:'training',title:'Sunset Session',        sub:'Training' },
    { src:'redbull5.jpeg',    cat:'redbull', title:'Pit Lane Briefing',     sub:'Red Bull Rookies' },
    { src:'race5.jpeg',       cat:'race',    title:'Race Start',            sub:'Race Day' },
    { src:'trackwalk4.jpeg',  cat:'redbull', title:'Track Walk',            sub:'Red Bull Rookies' },
    { src:'behindscene2.jpeg',cat:'behind',  title:'Marc Marquez Monument', sub:'Behind The Scenes' },
    { src:'training4.jpeg',   cat:'training',title:'Corner Speed',          sub:'Training' },
    { src:'redbull6.jpeg',    cat:'redbull', title:'120 Selectees',         sub:'Red Bull Rookies' },
    { src:'behindscene3.jpeg',cat:'behind',  title:'Garage',                sub:'Behind The Scenes' },
    { src:'race4.jpeg',       cat:'race',    title:'Pack Racing',           sub:'Race Day' },
    { src:'trackwalk2.jpeg',  cat:'behind',  title:'Track Walk',            sub:'Portimao' },
    { src:'media1.png',       cat:'media',   title:'FTV Interview',         sub:'Media' },

    { src:'redbull4.jpeg',    cat:'redbull', title:'On Track',              sub:'Red Bull Rookies' },
    { src:'training1.jpeg',   cat:'training',title:'SPN Academy',           sub:'Training' },
    { src:'training3.jpeg',   cat:'training',title:'On The Brakes',         sub:'Training' },
    { src:'training5.jpeg',   cat:'training',title:'Track Time',            sub:'Training' },
    { src:'race2.jpeg',       cat:'race',    title:'Full Lean',             sub:'Race Day' },
    { src:'behindscene1.jpeg',cat:'behind',  title:'Pit Lane',              sub:'Behind The Scenes' },
    { src:'race3.jpeg',       cat:'race',    title:'Mid Corner',            sub:'Race Day' },
    { src:'behindscene4.jpeg',cat:'behind',  title:'Team Debrief',          sub:'Behind The Scenes' },

    // ── ADD NEW PHOTOS BELOW THIS LINE ──
    { src:'behindscene5.jpeg',cat:'behind',  title:'Race Day Prep',         sub:'Behind The Scenes' },
    { src:'behindscene6.jpeg',cat:'behind',  title:'With The Team',         sub:'Behind The Scenes' },
    { src:'trackwalk1.jpeg',  cat:'behind',  title:'Track Walk',            sub:'Circuit de Catalunya' },
    { src:'trackwalk3.jpeg',  cat:'behind',  title:'Track Walk',            sub:'Jerez' },
  ];

  const INITIAL_COUNT = 24;
  const PAGE_SIZE     = 9;

  // ── STATE ────────────────────────────────────────────────────────────────────
  const photoGrid    = document.getElementById('photoGrid');
  const showMoreWrap = document.getElementById('showMoreWrap');
  const showMoreBtn  = document.getElementById('showMoreBtn');
  const photoCount   = document.getElementById('photoCount');
  const lb           = document.getElementById('lb');
  const lbImg        = document.getElementById('lbImg');
  const lbCap        = document.getElementById('lbCap');

  let activePhotos = [];
  let loadedUpTo   = 0;
  let cur          = 0;
  let currentFilter = 'all';

  // ── HELPERS ──────────────────────────────────────────────────────────────────
  function makeTile(photo, lbIndex) {
    const div = document.createElement('div');
    div.className = 'item';
    div.dataset.lbindex = lbIndex;
    div.innerHTML = `
      <img src="${photo.src}" alt="${photo.title}" loading="lazy"/>
      <div class="cap">
        <div class="ct">${photo.title}</div>
        <div class="cs">${photo.sub}</div>
      </div>`;
    div.addEventListener('click', () => {
      activePhotos = currentFilter === 'all'
        ? PHOTOS.slice(0, loadedUpTo)
        : PHOTOS.filter(p => p.cat === currentFilter);
      openLb(lbIndex);
    });
    return div;
  }

  function updateCountLabel() {
    const pool = currentFilter === 'all' ? PHOTOS : PHOTOS.filter(p => p.cat === currentFilter);
    const remaining = pool.length - loadedUpTo;
    if (remaining <= 0) {
      showMoreWrap.classList.remove('visible');
    } else {
      showMoreWrap.classList.add('visible');
      const next = Math.min(remaining, PAGE_SIZE);
      photoCount.textContent = next + ' of ' + remaining + ' remaining';
    }
  }

  // ── RENDER ───────────────────────────────────────────────────────────────────
  function renderAll(filter) {
    currentFilter = filter;
    photoGrid.innerHTML = '';
    loadedUpTo = 0;

    const pool = filter === 'all' ? PHOTOS : PHOTOS.filter(p => p.cat === filter);
    const initial = pool.slice(0, INITIAL_COUNT);
    loadedUpTo = initial.length;

    initial.forEach((photo, i) => photoGrid.appendChild(makeTile(photo, i)));
    activePhotos = pool.slice(0, loadedUpTo);
    updateCountLabel();
  }

  // Initial render
  renderAll('all');

  // ── SHOW MORE ────────────────────────────────────────────────────────────────
  showMoreBtn.addEventListener('click', () => {
    const pool = currentFilter === 'all' ? PHOTOS : PHOTOS.filter(p => p.cat === currentFilter);
    const batch = pool.slice(loadedUpTo, loadedUpTo + PAGE_SIZE);
    const startIndex = loadedUpTo;
    batch.forEach((photo, i) => photoGrid.appendChild(makeTile(photo, startIndex + i)));
    loadedUpTo = Math.min(loadedUpTo + PAGE_SIZE, pool.length);
    activePhotos = pool.slice(0, loadedUpTo);
    updateCountLabel();
  });

  // ── FILTERS ──────────────────────────────────────────────────────────────────
  document.querySelectorAll('.gf').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.gf').forEach(b => b.classList.remove('on'));
      btn.classList.add('on');
      renderAll(btn.dataset.filter);
    });
  });

  // ── LIGHTBOX ─────────────────────────────────────────────────────────────────
  function openLb(index) {
    cur = index;
    lbImg.src = activePhotos[cur].src;
    lbCap.textContent = activePhotos[cur].title + ' — ' + activePhotos[cur].sub;
    lb.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLb() {
    lb.classList.remove('open');
    document.body.style.overflow = '';
  }

  document.getElementById('lbClose').onclick = closeLb;
  lb.addEventListener('click', e => { if (e.target === lb) closeLb(); });

  document.getElementById('lbPrev').onclick = () => {
    cur = (cur - 1 + activePhotos.length) % activePhotos.length;
    lbImg.src = activePhotos[cur].src;
    lbCap.textContent = activePhotos[cur].title + ' — ' + activePhotos[cur].sub;
  };
  document.getElementById('lbNext').onclick = () => {
    cur = (cur + 1) % activePhotos.length;
    lbImg.src = activePhotos[cur].src;
    lbCap.textContent = activePhotos[cur].title + ' — ' + activePhotos[cur].sub;
  };
  document.addEventListener('keydown', e => {
    if (!lb
